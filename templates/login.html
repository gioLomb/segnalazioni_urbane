<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accedi - SegnalaCity</title>
  <link rel="stylesheet" href="/templates/common.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="brand-icon">&#128205;</div>
      <h2 class="brand-title">SegnalaCity</h2>

      {{ERROR_BLOCK}}

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Username</label>
          <input name="username" required autocomplete="username" placeholder="Il tuo username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input name="password" type="password" required placeholder="La tua password">
        </div>
        <button class="btn btn-primary btn-full" type="submit">Accedi</button>
      </form>

      <p class="auth-footer">
        Non hai un account? <a href="/register">Registrati</a>
      </p>
    </div>
  </div>
</body>
</html>
