<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mappa operatore - SegnalaCity</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/static/common.css">
  <style>
    #map { height: 420px; border-radius: 10px; margin-bottom: 1.5rem; }
    .loading { color: #9ca3af; font-style: italic; }
    .filters {
      display:flex; flex-wrap:wrap; gap:.75rem;
      align-items:flex-end; margin-bottom:1.25rem;
    }
    .filters label { font-size:.8rem; font-weight:600; color:#6b7280; display:block; margin-bottom:.2rem; }
    .filters select, .filters input[type="date"] {
      padding:.4rem .65rem; border:1px solid #d1d5db; border-radius:7px;
      font-size:.875rem; background:#fff; cursor:pointer;
    }
    .filters .btn-sm { padding:.4rem .9rem; font-size:.85rem; }
  </style>
</head>
<body>

  <nav class="navbar">
    <h1>&#128205; SegnalaCity</h1>
    <div class="nav-right">
      <span>{{USERNAME}} (Operatore)</span>
      <a href="/logout">Esci</a>
    </div>
  </nav>

  <div class="page-content">

    <div class="page-header">
      <h2>&#128204; Segnalazioni — {{CITY}}</h2>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="val" id="s-progress">-</div>
        <div class="lbl">Assegnate a me</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:1.5rem">
      <div id="map"></div>
    </div>

    <div class="card" style="margin-bottom:1.5rem">
      <div class="filters">
        <div>
          <label>Categoria</label>
          <select id="f-category">
            <option value="">Tutte</option>
            <option>Buche e asfalto</option>
            <option>Illuminazione</option>
            <option>Rifiuti</option>
            <option>Verde pubblico</option>
            <option>Vandalismo</option>
            <option>Sicurezza</option>
            <option>Altro</option>
          </select>
        </div>
        <div>
          <label>Dal</label>
          <input type="date" id="f-date-from">
        </div>
        <div>
          <label>Al</label>
          <input type="date" id="f-date-to">
        </div>
        <div>
          <button class="btn btn-primary btn-sm" onclick="applyFilters()">Filtra</button>
          <button class="btn btn-sm" style="margin-left:.4rem" onclick="resetFilters()">Reset</button>
        </div>
      </div>
      <h3 style="margin-bottom:1rem">In lavorazione — {{CITY}}</h3>
      <div id="reports-table"><p class="loading">Caricamento...</p></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:1rem">&#128190; Archiviate — {{CITY}}</h3>
      <div id="archived-table"><p class="loading">Caricamento...</p></div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var STATUS_CLASS = ['badge-0','badge-1','badge-2'];

    var allActive = [];
    var markers   = [];

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    /* ── Mappa ─────────────────────────────────────────────── */
    var map = L.map('map').setView([41.9,12.5],10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap contributors'
    }).addTo(map);

    function clearMarkers() {
      markers.forEach(function(m){ map.removeLayer(m); });
      markers = [];
    }

    function drawMarkers(reports) {
      clearMarkers();
      var bounds = [];
      reports.forEach(function(r) {
        if (!r.lat && !r.lon) return;
        var mk = L.marker([r.lat,r.lon]).addTo(map);
        mk.bindPopup('<b>#'+r.id+' — '+esc(r.category)+'</b><br>'+esc(r.description));
        markers.push(mk);
        bounds.push([r.lat,r.lon]);
      });
      if (bounds.length > 1) {
        try { map.fitBounds(bounds,{padding:[30,30]}); } catch(e){}
      }
    }

    /* ── Filtri ────────────────────────────────────────────── */
    function getFiltered() {
      var cat      = document.getElementById('f-category').value;
      var dateFrom = document.getElementById('f-date-from').value;
      var dateTo   = document.getElementById('f-date-to').value;
      var fromTs   = dateFrom ? new Date(dateFrom).getTime()/1000 : null;
      var toTs     = dateTo   ? new Date(dateTo).getTime()/1000+86399 : null;
      return allActive.filter(function(r) {
        if (cat    && r.category !== cat)    return false;
        if (fromTs && r.created_at < fromTs) return false;
        if (toTs   && r.created_at > toTs)   return false;
        return true;
      });
    }

    function applyFilters() { renderActive(getFiltered()); }
    function resetFilters() {
      document.getElementById('f-category').value  = '';
      document.getElementById('f-date-from').value = '';
      document.getElementById('f-date-to').value   = '';
      renderActive(allActive);
    }

    /* ── Aggiorna stato ────────────────────────────────────── */
    function updateStatus(reportId, newStatus) {
      fetch('/api/report/status', {
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'report_id='+reportId+'&status='+newStatus
      })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.ok) { loadActive(); loadArchived(); }
        else alert('Errore: '+(d.error||'sconosciuto'));
      })
      .catch(function(){ alert('Errore di rete.'); });
    }

    /* ── Render in lavorazione ─────────────────────────────── */
    function renderActive(reports) {
      drawMarkers(reports);
      var c = document.getElementById('reports-table');

      document.getElementById('s-progress').textContent = reports ? reports.length : 0;

      if (!reports || !reports.length) {
        c.innerHTML = '<p class="loading">Nessuna segnalazione assegnata.</p>';
        return;
      }

      var h = '<table><thead><tr>'
        +'<th>ID</th><th>Categoria</th><th>Descrizione</th>'
        +'<th>Data</th><th>Azioni</th>'
        +'</tr></thead><tbody>';

      reports.forEach(function(r) {
        var d = new Date(r.created_at*1000).toLocaleDateString('it-IT');
        /*
         * La query server restituisce solo status=1 (assegnate a questo operatore).
         * L'assegnazione spetta esclusivamente all'amministratore comunale:
         * qui l'operatore può solo segnare il lavoro come risolto.
         */
        var acts = '<button class="btn btn-success btn-sm" '
                 + 'onclick="updateStatus('+r.id+',2)">&#10003; Segna risolto</button>';

        h += '<tr>'
          +'<td>#'+r.id+'</td>'
          +'<td>'+esc(r.category)+'</td>'
          +'<td>'+esc(r.description)+'</td>'
          +'<td>'+d+'</td>'
          +'<td>'+acts+'</td>'
          +'</tr>';
      });

      h += '</tbody></table>';
      c.innerHTML = h;
    }

    /* ── Render archiviate ─────────────────────────────────── */
    function renderArchived(reports) {
      var c = document.getElementById('archived-table');
      if (!reports || !reports.length) {
        c.innerHTML = '<p class="loading">Nessuna segnalazione archiviata.</p>';
        return;
      }
      var h = '<table><thead><tr>'
        +'<th>ID</th><th>Categoria</th><th>Descrizione</th>'
        +'<th>Creata</th><th>Risolta</th>'
        +'</tr></thead><tbody>';
      reports.forEach(function(r) {
        var dc = new Date(r.created_at*1000).toLocaleDateString('it-IT');
        var dr = (r.resolved_at && r.resolved_at > 0)
               ? new Date(r.resolved_at*1000).toLocaleDateString('it-IT') : '—';
        h += '<tr>'
          +'<td>#'+r.id+'</td>'
          +'<td>'+esc(r.category)+'</td>'
          +'<td>'+esc(r.description)+'</td>'
          +'<td>'+dc+'</td>'
          +'<td>'+dr+'</td>'
          +'</tr>';
      });
      h += '</tbody></table>';
      c.innerHTML = h;
    }

    /* ── Caricamento ───────────────────────────────────────── */
    function loadActive() {
      fetch('/api/reports/active')
        .then(function(r){ return r.json(); })
        .then(function(d){
          allActive = d;
          renderActive(getFiltered());
        })
        .catch(function(){
          document.getElementById('reports-table').innerHTML =
            '<p class="loading">Errore di caricamento.</p>';
        });
    }

    function loadArchived() {
      fetch('/api/reports/archived')
        .then(function(r){ return r.json(); })
        .then(renderArchived)
        .catch(function(){
          document.getElementById('archived-table').innerHTML =
            '<p class="loading">Errore di caricamento.</p>';
        });
    }

    loadActive();
    loadArchived();
    setInterval(loadActive, 30000);
  </script>

</body>
</html>
