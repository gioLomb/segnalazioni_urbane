<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registrati - SegnalaCity</title>
  <link rel="stylesheet" href="/static/common.css">

</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-card" style="max-width:440px">
      <div class="brand-icon">&#128205;</div>
      <h2 class="brand-title">Crea un account</h2>

      {{ERROR_BLOCK}}

      <form method="POST" action="/register">
        <div class="form-group">
          <label>Username</label>
          <input name="username" required placeholder="Scegli un username" maxlength="30">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input name="password" type="password" required placeholder="Almeno 6 caratteri">
        </div>
        <div class="form-group">
          <label>Città</label>
          <input name="city" required placeholder="Es: Roma" maxlength="30">
        </div>
        <div class="form-group">
          <label>Ruolo</label>
          <select name="role">
            <option value="0">Cittadino</option>
            <option value="1">Operatore municipale</option>
          </select>
        </div>
        <button class="btn btn-primary btn-full" type="submit">Registrati</button>
      </form>

      <p class="auth-footer">
        Hai già un account? <a href="/">Accedi</a>
      </p>
    </div>
  </div>
</body>
</html>
