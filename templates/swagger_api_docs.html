<script>
  // OpenAPI spec embedded directly in the HTML — no server required.
  // To update the spec: replace the content of the YAML_SPEC string below.
  const YAML_SPEC = "openapi: 3.0.3\n\ninfo:\n  title: Segnalacity API\n  description: |\n    JSON API for the urban reporting platform **Segnalacity**, written in C with libuv and SQLite.\n\n    ## Authentication\n    All protected routes require a session cookie `sid` obtained via `POST /login`.\n    The token is a random 32-character hexadecimal string with a maximum lifetime of 24 hours.\n\n    ## Roles\n    | Value | Role | Description |\n    |-------|------|-------------|\n    | `0` | **Citizen** | Submit reports, view own reports, leave feedback |\n    | `1` | **Operator** | Accept/reject assignments, mark reports as resolved |\n    | `2` | **Admin** | View all city reports, assign operators |\n\n    ## Report lifecycle\n    ```\n    \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n    \u2502                                                     \u2502\n    \u25bc                                                     \u2502\n    ACTIVE (0)                                         (reject)\n        \u2502                                                  \u2502\n        \u2514\u2500\u2500(admin assigns)\u2500\u2500\u25ba ASSIGNED (1) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                   \u2502\n                             (accept)\n                                   \u2502\n                                   \u25bc\n                           IN_PROGRESS (2)\n                                   \u2502\n                          (operator resolves)\n                                   \u2502\n                                   \u25bc\n                           RESOLVED (3)\n                                   \u2502\n                        (citizen leaves feedback)\n    ```\n\n    ## Technical notes\n    - POST request bodies use `application/x-www-form-urlencoded`\n    - Error responses always have the shape `{\"error\": \"<message>\"}`\n    - Success responses for write actions have the shape `{\"ok\": true}`\n    - Report arrays are served from an in-memory TTL cache when available; the cache is invalidated automatically on every write operation\n\n  version: 1.0.0\n\nservers:\n  - url: http://localhost:8080\n    description: Local server (default)\n  - url: http://localhost:{port}\n    description: Local server on custom port\n    variables:\n      port:\n        default: \"8080\"\n        description: Configurable via PORT macro in config.h\n\ntags:\n  - name: Public\n    description: Endpoints accessible without authentication\n  - name: Reports\n    description: Endpoints for authenticated citizens and operators\n  - name: Citizen\n    description: Endpoints reserved for citizens\n  - name: Operator\n    description: Endpoints reserved for operators\n  - name: Admin\n    description: Endpoints reserved for municipal administrators\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n# Reusable components\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ncomponents:\n\n  securitySchemes:\n    cookieAuth:\n      type: apiKey\n      in: cookie\n      name: sid\n      description: >\n        32-character hexadecimal session token set by the server at login.\n        Cookie attributes: HttpOnly, SameSite=Lax, Max-Age=86400.\n\n  schemas:\n\n    ReportStatus:\n      type: integer\n      enum: [0, 1, 2, 3]\n      description: |\n        Report lifecycle status:\n        - `0` \u2014 ACTIVE: submitted, not yet assigned\n        - `1` \u2014 ASSIGNED: assigned by admin, awaiting operator response\n        - `2` \u2014 IN_PROGRESS: accepted by operator \u2014 work underway\n        - `3` \u2014 RESOLVED: marked as resolved by operator\n      example: 0\n\n    Report:\n      type: object\n      description: A single urban report.\n      properties:\n        reportId:\n          type: integer\n          format: int64\n          description: Unique report identifier\n          example: 42\n        authorId:\n          type: integer\n          format: int64\n          description: ID of the citizen who submitted the report\n          example: 7\n        assignedTo:\n          type: integer\n          format: int64\n          nullable: true\n          description: ID of the assigned operator (null if not yet assigned)\n          example: 3\n        lat:\n          type: number\n          format: double\n          description: Latitude of the reported location\n          example: 41.1171\n        lon:\n          type: number\n          format: double\n          description: Longitude of the reported location\n          example: 16.8719\n        city:\n          type: string\n          maxLength: 31\n          description: Municipality name (max 31 characters)\n          example: \"Bari\"\n        category:\n          type: string\n          maxLength: 15\n          description: Issue category (e.g. Pothole, Lighting, Waste, Other)\n          example: \"Pothole\"\n        description:\n          type: string\n          maxLength: 127\n          description: Free-text description of the issue (max 127 characters)\n          example: \"Large pothole on via Sparano at the corner of via Abate Gimma\"\n        status:\n          $ref: '#/components/schemas/ReportStatus'\n        createdAt:\n          type: integer\n          format: int64\n          description: Unix timestamp of creation\n          example: 1716825600\n        assignedAt:\n          type: integer\n          format: int64\n          nullable: true\n          description: Unix timestamp of assignment (null if not assigned)\n          example: null\n        resolvedAt:\n          type: integer\n          format: int64\n          nullable: true\n          description: Unix timestamp of resolution (null if not resolved)\n          example: null\n        feedback:\n          type: integer\n          minimum: 1\n          maximum: 5\n          nullable: true\n          description: Citizen rating from 1 to 5 stars (null if not yet submitted)\n          example: null\n\n    Operator:\n      type: object\n      description: Public data for a municipal operator.\n      properties:\n        userId:\n          type: integer\n          format: int64\n          example: 3\n        username:\n          type: string\n          maxLength: 31\n          example: \"mario_operator\"\n        city:\n          type: string\n          maxLength: 31\n          example: \"Bari\"\n        role:\n          type: integer\n          enum: [1]\n          description: Always 1 (OPERATOR) for this endpoint\n          example: 1\n\n    OkResponse:\n      type: object\n      description: Success response for write actions.\n      properties:\n        ok:\n          type: boolean\n          example: true\n\n    ErrorResponse:\n      type: object\n      description: Generic error response.\n      properties:\n        error:\n          type: string\n          example: \"unauthorized\"\n\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n# Endpoints\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\npaths:\n\n  # \u2500\u2500 Public \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n  /api/cities:\n    get:\n      operationId: getCities\n      summary: List of available municipalities\n      description: >\n        Returns the JSON array of all Italian municipality names loaded at boot\n        from `data/comuni.geojson` (ISTAT dataset).\n        No authentication required. Used by the front-end to populate the city\n        selector during registration and report submission.\n      tags: [Public]\n      responses:\n        '200':\n          description: Array of municipality name strings\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  type: string\n              example: [\"Bari\", \"Milano\", \"Roma\", \"Napoli\"]\n        '404':\n          description: cities.json file not found (server configuration error)\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"cities not found\"\n\n  # \u2500\u2500 Reports (citizen + operator) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n  /api/reports/active:\n    get:\n      operationId: getActiveReports\n      summary: Active reports for the current user\n      description: |\n        Returns active reports filtered by role:\n        - **Citizen**: own reports with status < RESOLVED (0, 1, 2)\n        - **Operator**: reports with status IN_PROGRESS (2) assigned to them\n\n        Results are served from the in-memory TTL cache when available;\n        the cache is invalidated automatically after any write on the city.\n      tags: [Reports]\n      security:\n        - cookieAuth: []\n      responses:\n        '200':\n          description: Array of active reports (may be empty)\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Report'\n        '401':\n          description: Session missing or expired\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"unauthorized\"\n\n  /api/reports/archived:\n    get:\n      operationId: getArchivedReports\n      summary: Archived (resolved) reports for the current user\n      description: |\n        Returns resolved reports filtered by role:\n        - **Citizen**: own reports with status RESOLVED (3)\n        - **Operator**: reports with status RESOLVED assigned to them\n\n        Results are also served from the in-memory TTL cache.\n      tags: [Reports]\n      security:\n        - cookieAuth: []\n      responses:\n        '200':\n          description: Array of resolved reports (may be empty)\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Report'\n        '401':\n          description: Session missing or expired\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"unauthorized\"\n\n  # \u2500\u2500 Citizen \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n  /api/report/feedback:\n    post:\n      operationId: submitFeedback\n      summary: Submit feedback on a resolved report\n      description: |\n        Allows the citizen author to leave a 1\u20135 star rating on one of their own resolved reports.\n\n        **Constraints:**\n        - Only the citizen who authored the report may submit feedback\n        - The report must have status RESOLVED (3)\n        - Feedback can only be submitted **once** \u2014 the field is not overwritable\n\n        **Access**: citizens only (`role: 0`).\n      tags: [Citizen]\n      security:\n        - cookieAuth: []\n      requestBody:\n        required: true\n        content:\n          application/x-www-form-urlencoded:\n            schema:\n              type: object\n              required: [report_id, stars]\n              properties:\n                report_id:\n                  type: integer\n                  format: int64\n                  description: ID of the resolved report\n                  example: 42\n                stars:\n                  type: integer\n                  minimum: 1\n                  maximum: 5\n                  description: Rating from 1 (worst) to 5 (best)\n                  example: 4\n      responses:\n        '200':\n          description: Feedback recorded successfully\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/OkResponse'\n        '400':\n          description: Missing parameters or stars out of range\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              examples:\n                missing:\n                  value: {error: \"missing params\"}\n                invalid_stars:\n                  value: {error: \"stars must be 1-5\"}\n        '403':\n          description: Not authenticated or role is not citizen\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"forbidden\"\n        '409':\n          description: Feedback already submitted or report not yet resolved\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"feedback already given or report not resolved\"\n        '500':\n          description: Database error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"db error\"\n\n  # \u2500\u2500 Operator \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n  /api/report/respond:\n    post:\n      operationId: respondToAssignment\n      summary: Accept or reject an assignment\n      description: |\n        Allows the operator to respond to an assignment received from the admin:\n        - **`accept`** \u2192 status becomes IN_PROGRESS (2), operator begins work\n        - **`reject`** \u2192 status returns to ACTIVE (0), report is available for reassignment\n\n        **Constraints:**\n        - The report must have status ASSIGNED (1)\n        - The report must be assigned to the operator making the request\n        - The report must belong to the same city as the operator\n\n        **Access**: operators only (`role: 1`).\n      tags: [Operator]\n      security:\n        - cookieAuth: []\n      requestBody:\n        required: true\n        content:\n          application/x-www-form-urlencoded:\n            schema:\n              type: object\n              required: [report_id, action]\n              properties:\n                report_id:\n                  type: integer\n                  format: int64\n                  description: ID of the assigned report\n                  example: 42\n                action:\n                  type: string\n                  enum: [accept, reject]\n                  description: Accept (`accept`) or reject (`reject`) the assignment\n                  example: \"accept\"\n      responses:\n        '200':\n          description: Response recorded successfully\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/OkResponse'\n        '400':\n          description: Missing parameters or invalid action value\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              examples:\n                missing:\n                  value: {error: \"missing params\"}\n                invalid_action:\n                  value: {error: \"action must be accept or reject\"}\n        '403':\n          description: Not authorized or city mismatch\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"forbidden\"\n        '404':\n          description: Report not found\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"not found\"\n        '409':\n          description: Report not assigned to this operator or wrong status\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"not assigned to you or wrong status\"\n        '500':\n          description: Database error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"db error\"\n\n  /api/report/status:\n    post:\n      operationId: resolveReport\n      summary: Mark a report as resolved\n      description: |\n        Allows the operator to mark a report as RESOLVED (status=3).\n\n        > \u2139\ufe0f This endpoint handles **resolution only**. To accept or reject an\n        > assignment use `POST /api/report/respond`.\n\n        **Constraints:**\n        - The report must have status IN_PROGRESS (2)\n        - The report must be assigned to the operator making the request\n        - The `status` field must be exactly `3`\n        - The report must belong to the same city as the operator\n\n        **Access**: operators only (`role: 1`).\n      tags: [Operator]\n      security:\n        - cookieAuth: []\n      requestBody:\n        required: true\n        content:\n          application/x-www-form-urlencoded:\n            schema:\n              type: object\n              required: [report_id, status]\n              properties:\n                report_id:\n                  type: integer\n                  format: int64\n                  description: ID of the report to resolve\n                  example: 42\n                status:\n                  type: integer\n                  enum: [3]\n                  description: Must be `3` (RESOLVED) \u2014 the only accepted value\n                  example: 3\n      responses:\n        '200':\n          description: Report marked as resolved\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/OkResponse'\n        '400':\n          description: Missing parameters or status value is not 3\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              examples:\n                missing:\n                  value: {error: \"missing params\"}\n                invalid_status:\n                  value: {error: \"invalid status\"}\n        '403':\n          description: Not authorized, report not IN_PROGRESS, or not assigned to this operator\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              examples:\n                forbidden:\n                  value: {error: \"forbidden\"}\n                not_in_progress:\n                  value: {error: \"not authorized or not in progress\"}\n        '404':\n          description: Report not found\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"not found\"\n        '500':\n          description: Database error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"db error\"\n\n  # \u2500\u2500 Admin \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n  /api/reports/all:\n    get:\n      operationId: getAllReports\n      summary: All reports for the city\n      description: |\n        Returns all reports in the admin's city, regardless of status or author.\n\n        **Not cached** \u2014 every call queries SQLite directly to ensure the admin\n        always sees up-to-date data.\n\n        **Access**: admins only (`role: 2`).\n      tags: [Admin]\n      security:\n        - cookieAuth: []\n      responses:\n        '200':\n          description: Array of all city reports (may be empty)\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Report'\n        '403':\n          description: Not authenticated or role is not admin\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"forbidden\"\n\n  /api/operators:\n    get:\n      operationId: getOperators\n      summary: List of city operators\n      description: |\n        Returns all operators registered in the admin's city.\n        Used by the front-end to populate the assignment selector on the admin map.\n\n        **Access**: admins only (`role: 2`).\n      tags: [Admin]\n      security:\n        - cookieAuth: []\n      responses:\n        '200':\n          description: Array of city operators (may be empty)\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/Operator'\n        '403':\n          description: Not authenticated or role is not admin\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"forbidden\"\n\n  /api/admin/assign:\n    post:\n      operationId: assignReport\n      summary: Assign a report to an operator\n      description: |\n        Allows the admin to assign a report to an operator in their city.\n        The report transitions from ACTIVE (0) to ASSIGNED (1); the operator\n        must then accept or reject via `POST /api/report/respond`.\n\n        **Reassignment behaviour:**\n        If the report is already ASSIGNED (1) but the operator has not yet responded,\n        the admin can reassign it to a different operator: the system resets the status\n        to ACTIVE and then assigns it to the new operator.\n\n        **Constraints:**\n        - The report must belong to the admin's city\n        - The operator must exist, have role OPERATOR, and belong to the same city\n        - If the report is already IN_PROGRESS (2) or RESOLVED (3), returns 409\n\n        **Access**: admins only (`role: 2`).\n      tags: [Admin]\n      security:\n        - cookieAuth: []\n      requestBody:\n        required: true\n        content:\n          application/x-www-form-urlencoded:\n            schema:\n              type: object\n              required: [report_id, operator_id]\n              properties:\n                report_id:\n                  type: integer\n                  format: int64\n                  description: ID of the report to assign\n                  example: 42\n                operator_id:\n                  type: integer\n                  format: int64\n                  description: ID of the operator to assign the report to\n                  example: 3\n      responses:\n        '200':\n          description: Assignment completed successfully\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/OkResponse'\n        '400':\n          description: Missing parameters or invalid operator (does not exist, wrong role, or different city)\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              examples:\n                missing:\n                  value: {error: \"missing params\"}\n                invalid_operator:\n                  value: {error: \"invalid operator\"}\n        '403':\n          description: Not authenticated, role is not admin, or report belongs to a different city\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"forbidden\"\n        '404':\n          description: Report not found\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"not found\"\n        '409':\n          description: Report is already IN_PROGRESS or RESOLVED\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"report already in progress or resolved\"\n        '500':\n          description: Database error\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/ErrorResponse'\n              example:\n                error: \"db error\"\n";
